{% extends "base.html" %}
{% block content %}
<h1>{{ post.title }}</h1>
<div>{{ post.content | safe }}</div>
<p>Tags:
  {% for tag in post.tags %}
  <a href="/tags/{{ tag }}.html">{{ tag }}</a>{% if not loop.last %}, {% endif %}
  {% endfor %}
</p>

<!-- ✅ Facebook Share Button -->
<div class="mt-8 pt-8 border-t border-gray-200">
  <button onclick="shareToFacebook()"
    class="inline-flex items-center gap-2 bg-[#1877F2] hover:bg-[#166fe5] text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm">
    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
      <path
        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
    </svg>
    แชร์ลง Facebook
  </button>
</div>

<script>
  function shareToFacebook() {
    // ✅ ใช้ BASE_URL ที่กำหนดไว้แทน window.location.href เพื่อให้ Facebook มองเห็น URL จริง
    const shareUrl = "{{ BASE_URL }}/{{ post.slug }}.html";
    const encodedUrl = encodeURIComponent(shareUrl);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`, 'facebook-share-dialog', 'width=800,height=600');
  }
</script>
{% endblock %}
